<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Reject Ubuntu Mono fonts so they don't override the default monospace. -->
  <selectfont>
    <rejectfont>
      <glob>/usr/share/fonts/ubuntu/UbuntuMono*.ttf</glob>
      <glob>/usr/share/fonts/ubuntu/UbuntuMono*.otf</glob>
      <glob>/usr/share/fonts/ubuntu/UbuntuMono*.ttc</glob>
      <glob>/usr/local/share/fonts/ubuntu-shared/truetype/ubuntu/UbuntuMono*.ttf</glob>
      <glob>/usr/local/share/fonts/ubuntu-shared/truetype/ubuntu/UbuntuMono*.otf</glob>
      <glob>/usr/local/share/fonts/ubuntu-shared/truetype/ubuntu/UbuntuMono*.ttc</glob>
      <glob>/usr/local/share/fonts/ubuntu-shared/truetype/ubuntu/UbuntuSansMono*.ttf</glob>
      <glob>/usr/local/share/fonts/ubuntu-shared/truetype/ubuntu/UbuntuSansMono*.otf</glob>
      <glob>/usr/local/share/fonts/ubuntu-shared/truetype/ubuntu/UbuntuSansMono*.ttc</glob>
    </rejectfont>
  </selectfont>
</fontconfig>
